# ALSA configuration to route audio through PulseAudio
# This allows Docker containers to use the host's audio system

pcm.!default {
    type pulse
    fallback "sysdefault"
    hint {
        show on
        description "Default ALSA Output (currently PulseAudio Sound Server)"
    }
}

ctl.!default {
    type pulse
    fallback "sysdefault"
}

pcm.pulse {
    type pulse
}

ctl.pulse {
    type pulse
}
